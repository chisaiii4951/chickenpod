<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Gallery</h1>
  <nav>
    <a href="index.html">Home</a>
  </nav>
</header>

<section class="gallery">

  <div class="card" onclick="openModal('proof')">
    <img src="proof.jpg" alt="">
    <h3>Proof of Dignity</h3>
  </div>

  <div class="card" onclick="openModal('shadows')">
    <img src="shadows.jpg" alt="">
    <h3>Night of Shadows</h3>
  </div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span onclick="closeModal()" class="close">&times;</span>

    <iframe id="widget"></iframe>
    <a id="invite" class="btn" target="_blank">Join Server</a>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
